
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_LOCAL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  pokedex-api:
    build: ./pokedex-api
    restart: on-failure
    env_file: ./.env
    ports:
      - "${API_LOCAL_PORT}:5000"
    depends_on:
      - postgres
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

  pokedex-frontend:
    build: ./pokedex-frontend
    restart: on-failure
    env_file: ./.env
    ports:
      - "${FRONTEND_LOCAL_PORT}:8080"
    depends_on:
      - postgres
      - pokedex-api
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POKEDEX_API_URL=http://pokedex-api:5000

volumes:
  postgres_data:
